<!DOCTYPE html>
<html lang="vi" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Sáng Tạo AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .option-btn { transition: all 0.2s ease; border: 2px solid #e2e8f0; }
        .option-btn.selected { border-color: #fbbf24; background-color: #fef3c7; color: #92400e; font-weight: 600; }
        html.dark .option-btn { border-color: #1e3a8a; }
        html.dark .option-btn.selected { background-color: #451a03; border-color: #fbbf24; color: #fbbf24; }
        .loader-spinner { border-top-color: #fbbf24; }
    </style>
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-white dark:bg-black text-blue-950 dark:text-blue-50 transition-colors duration-300">

    <!-- Thông báo tùy chỉnh thay thế cho alert -->
    <div id="toast" class="fixed top-5 right-5 z-50 transform translate-y-[-150%] transition-transform duration-300 bg-red-500 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center space-x-3">
        <i class="fas fa-exclamation-circle text-lg"></i>
        <span id="toast-message" class="font-medium">Có lỗi xảy ra!</span>
    </div>

    <div class="flex flex-col md:flex-row h-screen overflow-hidden">
        <!-- Sidebar điều khiển bên trái -->
        <aside class="w-full md:w-[400px] bg-white dark:bg-blue-950 border-r border-blue-100 dark:border-blue-900 p-6 flex flex-col shadow-xl overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-xl font-bold uppercase tracking-wider text-blue-900 dark:text-yellow-400">Studio AI</h1>
                <button id="theme-toggle" class="h-10 w-10 flex items-center justify-center rounded-full bg-blue-50 dark:bg-blue-900 hover:bg-yellow-100 dark:hover:bg-yellow-900 transition">
                    <i class="fas fa-sun dark:hidden"></i>
                    <i class="fas fa-moon hidden dark:block"></i>
                </button>
            </div>

            <div class="flex-grow space-y-5">
                <!-- Nhập cấu hình API Key (Giải pháp khắc phục lỗi bảo mật khi đẩy lên GitHub) -->
                <div class="p-4 bg-yellow-50/50 dark:bg-yellow-950/10 border border-yellow-200 dark:border-yellow-900/50 rounded-2xl">
                    <label class="block text-xs font-bold uppercase mb-2 text-yellow-800 dark:text-yellow-400 flex justify-between items-center">
                        <span>Gemini API Key của bạn</span>
                        <a href="https://aistudio.google.com/" target="_blank" class="text-[10px] text-blue-600 dark:text-yellow-300 hover:underline flex items-center">
                            Lấy Key miễn phí <i class="fas fa-external-link-alt ml-1"></i>
                        </a>
                    </label>
                    <div class="relative">
                        <input id="api-key-input" type="password" class="w-full p-2.5 pr-10 border border-yellow-300 dark:border-yellow-900/50 rounded-xl bg-white dark:bg-blue-900 focus:ring-2 focus:ring-yellow-400 outline-none transition text-xs font-mono" placeholder="Nhập khóa AIzaSy...">
                        <button onclick="toggleApiKeyVisibility()" class="absolute right-3 top-3 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xs">
                            <i id="eye-icon" class="fas fa-eye"></i>
                        </button>
                    </div>
                    <p class="text-[9px] text-gray-400 dark:text-gray-500 mt-1.5"><i class="fas fa-shield-alt mr-1"></i>Được lưu trữ an toàn trong LocalStorage trình duyệt của riêng bạn.</p>
                </div>

                <!-- Nhập mô tả ảnh -->
                <div>
                    <label class="block text-sm font-bold uppercase mb-2 opacity-70">Mô tả hình ảnh</label>
                    <textarea id="prompt-input" rows="4" class="w-full p-4 border border-blue-200 dark:border-blue-800 rounded-xl bg-gray-50 dark:bg-blue-900 focus:ring-2 focus:ring-yellow-400 outline-none transition" placeholder="Ví dụ: Một chú mèo phi hành gia trên sao Hỏa phát sáng rực rỡ..."></textarea>
                </div>

                <!-- Lựa chọn phong cách -->
                <div>
                    <label class="block text-sm font-bold uppercase mb-2 opacity-70">Phong cách nghệ thuật</label>
                    <select id="style-select" class="w-full p-3 border border-blue-200 dark:border-blue-800 rounded-xl bg-white dark:bg-blue-900 font-medium">
                        <option value="Photorealistic" selected>Ảnh chân thực (Photorealistic)</option>
                        <option value="Anime">Anime Nhật Bản</option>
                        <option value="Oil Painting">Tranh sơn dầu (Oil Painting)</option>
                        <option value="Digital Art">Nghệ thuật số (Digital Art)</option>
                        <option value="Watercolor">Tranh màu nước (Watercolor)</option>
                        <option value="Pencil Sketch">Phác thảo chì (Pencil Sketch)</option>
                        <option value="Cyberpunk">Cyberpunk</option>
                        <option value="3D Animation">Hoạt hình 3D (3D Render)</option>
                        <option value="Historical Costume">Cổ trang dã sử</option>
                        <option value="Mythology">Thần thoại huyền ảo</option>
                        <option value="Minimalism">Phong cách tối giản</option>
                        <option value="Pop Art">Pop Art</option>
                    </select>
                </div>

                <!-- Tỷ lệ khung hình -->
                <div>
                    <label class="block text-sm font-bold uppercase mb-2 opacity-70">Tỷ lệ khung hình</label>
                    <div class="grid grid-cols-3 gap-2" id="aspect-ratio-group">
                        <button class="option-btn selected p-2 rounded-lg border text-sm" data-ratio="1:1" onclick="selectOption(this)">1:1</button>
                        <button class="option-btn p-2 rounded-lg border text-sm" data-ratio="16:9" onclick="selectOption(this)">16:9</button>
                        <button class="option-btn p-2 rounded-lg border text-sm" data-ratio="9:16" onclick="selectOption(this)">9:16</button>
                    </div>
                </div>
            </div>

            <!-- Nút tạo ảnh -->
            <div class="mt-6 pt-4 border-t border-blue-100 dark:border-blue-900">
                <button id="generate-btn" onclick="generateImage()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-blue-950 font-bold py-4 rounded-xl shadow-lg transition transform active:scale-[0.98]">
                    <i class="fas fa-magic mr-2"></i>Tạo Ảnh Ngay
                </button>
                <div class="mt-4 text-center text-[10px] text-gray-400 uppercase tracking-widest font-semibold">
                    Thiết kế bởi Hoàng Kim Long @2026
                </div>
            </div>
        </aside>

        <!-- Vùng hiển thị kết quả bên phải -->
        <main class="flex-1 p-6 md:p-12 overflow-y-auto bg-gray-50 dark:bg-black flex flex-col">
            <div id="image-display-area" class="flex-1 w-full rounded-3xl border-2 border-dashed border-blue-200 dark:border-blue-800 flex flex-col items-center justify-center p-8 bg-white/50 dark:bg-blue-950/20 relative overflow-hidden min-h-[350px]">
                
                <!-- Placeholder ban đầu -->
                <div id="placeholder" class="text-center transition duration-300">
                    <div class="text-6xl text-blue-200 dark:text-blue-800 mb-6">
                        <i class="fas fa-wand-magic-sparkles animate-pulse"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-blue-950 dark:text-white">Sẵn sàng để sáng tạo?</h2>
                    <p class="text-blue-500 mt-2">Nhập yêu cầu sáng tạo của bạn bên trái và nhấn nút tạo ảnh</p>
                </div>
                
                <!-- Vùng Loading tải ảnh -->
                <div id="loader" class="hidden text-center">
                    <div class="w-16 h-16 border-4 border-yellow-400 border-t-transparent rounded-full animate-spin loader-spinner mx-auto mb-4"></div>
                    <p class="text-yellow-500 font-bold text-lg animate-pulse">Imagen-4 đang vẽ bức tranh của bạn...</p>
                    <p class="text-xs text-gray-400 mt-2">Quá trình này mất khoảng vài giây</p>
                </div>
                
                <!-- Kết quả hiển thị kèm nút tiện ích -->
                <div id="result-container" class="hidden w-full h-full flex flex-col items-center justify-center relative">
                    <img id="generated-image" src="" alt="Result" class="max-w-full max-h-[75vh] object-contain rounded-2xl shadow-2xl transition duration-300 border border-gray-100 dark:border-gray-800">
                    
                    <div class="flex space-x-3 mt-6">
                        <button onclick="downloadImage()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl font-semibold shadow-md flex items-center space-x-2 transition">
                            <i class="fas fa-download"></i>
                            <span>Tải xuống</span>
                        </button>
                        <button onclick="copyToClipboard()" class="bg-gray-600 hover:bg-gray-700 text-white px-5 py-2.5 rounded-xl font-semibold shadow-md flex items-center space-x-2 transition">
                            <i class="fas fa-copy"></i>
                            <span>Sắp chép Link</span>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Khi tải trang: Nạp lại API key cũ từ localStorage nếu có
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                document.getElementById('api-key-input').value = savedKey;
            }
        });

        // Ẩn / Hiện API Key
        function toggleApiKeyVisibility() {
            const input = document.getElementById('api-key-input');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye');
                icon.classList.add('text-yellow-500');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye', 'fa-eye'); // icon vẫn là fa-eye nhưng đổi kiểu
                icon.classList.remove('text-yellow-500');
            }
        }

        // Bật tắt chủ đề tối/sáng (Dark mode)
        document.getElementById('theme-toggle').addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Hàm chọn tỉ lệ khung hình hoặc các tùy chọn khác
        let selectedAspectRatio = "1:1";
        function selectOption(btn) {
            btn.parentElement.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedAspectRatio = btn.getAttribute('data-ratio');
        }

        // Hiện thông báo toast tùy chỉnh thay thế alert() thông thường
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.innerText = message;
            toast.classList.remove('translate-y-[-150%]');
            toast.classList.add('translate-y-0');
            setTimeout(() => {
                toast.classList.remove('translate-y-0');
                toast.classList.add('translate-y-[-150%]');
            }, 4000);
        }

        // Tải ảnh về máy người dùng
        function downloadImage() {
            const img = document.getElementById('generated-image');
            if (!img.src) return;
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `art-studio-${Date.now()}.png`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Sao chép liên kết Base64 / URL ảnh vào Clipboard
        function copyToClipboard() {
            const img = document.getElementById('generated-image');
            if (!img.src) return;
            
            // Sử dụng textarea dự phòng do hạn chế của Clipboard API trong môi trường iFrame
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = img.src;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            try {
                document.execCommand('copy');
                showToast("Đã sao chép dữ liệu ảnh vào khay nhớ tạm!");
            } catch (err) {
                showToast("Lỗi sao chép!");
            }
            document.body.removeChild(tempTextArea);
        }

        // Hàm gửi yêu cầu tạo ảnh với cơ chế thử lại tự động (Exponential Backoff)
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delay = 1000; // Khởi đầu với độ trễ 1s
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) {
                        return await response.json();
                    } else {
                        const errData = await response.json().catch(() => ({}));
                        if (errData?.error?.message) {
                            throw new Error(errData.error.message);
                        }
                    }
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                }
                // Trì hoãn luỹ tiến trước khi thử lại lần tiếp theo
                await new Promise(resolve => setTimeout(resolve, delay));
                delay *= 2; 
            }
            throw new Error("Không thể kết nối đến máy chủ AI sau nhiều lần thử.");
        }

        async function generateImage() {
            const prompt = document.getElementById('prompt-input').value.trim();
            const style = document.getElementById('style-select').value;
            const placeholder = document.getElementById('placeholder');
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('result-container');
            const generatedImage = document.getElementById('generated-image');
            const generateBtn = document.getElementById('generate-btn');
            
            // Đọc API Key từ input và lưu lại
            const apiKeyInput = document.getElementById('api-key-input').value.trim();
            if (apiKeyInput) {
                localStorage.setItem('gemini_api_key', apiKeyInput);
            }

            if (!apiKeyInput) {
                showToast("Vui lòng cấu hình Gemini API Key trước khi tạo ảnh!");
                return;
            }

            if (!prompt) {
                showToast("Vui lòng nhập mô tả hình ảnh trước khi bắt đầu tạo!");
                return;
            }

            // Thiết lập trạng thái Loading
            placeholder.classList.add('hidden');
            resultContainer.classList.add('hidden');
            loader.classList.remove('hidden');
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKeyInput}`;

                // Tổng hợp prompt chi tiết kết hợp phong cách và tỷ lệ
                const finalPrompt = `${prompt}, style of ${style}, dynamic lighting, high resolution, 8k`;

                // Cấu trúc payload chuẩn cho imagen-4.0-generate-001
                const payload = {
                    instances: [
                        {
                            prompt: finalPrompt
                        }
                    ],
                    parameters: {
                        sampleCount: 1,
                        aspectRatio: selectedAspectRatio,
                        outputMimeType: "image/png"
                    }
                };
                
                const result = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                // Trích xuất mã hóa ảnh Base64 trả về từ API
                const base64Bytes = result?.predictions?.[0]?.bytesBase64Encoded;
                
                if (base64Bytes) {
                    generatedImage.src = `data:image/png;base64,${base64Bytes}`;
                    resultContainer.classList.remove('hidden');
                } else {
                    throw new Error("Phản hồi từ AI không chứa dữ liệu hình ảnh hợp lệ.");
                }
            } catch (err) {
                console.error(err);
                placeholder.classList.remove('hidden');
                showToast(err.message || "Đã xảy ra lỗi không xác định!");
            } finally {
                loader.classList.add('hidden');
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
